<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Cubagem Profissional</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 30px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.produto-linha {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

select, input {
    padding: 8px;
    font-size: 14px;
}

button {
    padding: 10px;
    font-size: 15px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
}

.add-btn {
    background: #28a745;
    color: white;
}

.calc-btn {
    background: #007bff;
    color: white;
    width: 100%;
    margin-top: 15px;
}

.resultado {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<h2>Sistema de Cubagem Profissional</h2>

<div id="listaProdutos"></div>

<button class="add-btn" onclick="adicionarProduto()">+ Adicionar Produto</button>
<button class="calc-btn" onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>
</div>

<script>

// 🔹 PRODUTOS (cm)
const produtos = {
    "Painel 100x2x2": { comprimento: 100, largura: 2, altura: 2 },
    "Barra 80x5x5": { comprimento: 80, largura: 5, altura: 5 },
    "Placa 60x40x3": { comprimento: 60, largura: 40, altura: 3 }
};

// 🔹 CAIXAS (cm)
const caixas = [
    { nome: "Pequena", comprimento: 60, largura: 40, altura: 30 },
    { nome: "Média", comprimento: 110, largura: 40, altura: 40 },
    { nome: "Grande", comprimento: 110, largura: 60, altura: 60 }

];

function adicionarProduto() {
    const div = document.createElement("div");
    div.className = "produto-linha";

    const select = document.createElement("select");
    for (let nome in produtos) {
        let option = document.createElement("option");
        option.value = nome;
        option.textContent = nome;
        select.appendChild(option);
    }

    const input = document.createElement("input");
    input.type = "number";
    input.min = "1";
    input.value = "1";
    input.style.width = "80px";

    div.appendChild(select);
    div.appendChild(input);

    document.getElementById("listaProdutos").appendChild(div);
}

// 🔹 VERIFICA SE PRODUTO CABE
function produtoCabe(produto, caixa) {

    const rotacoes = [
        [produto.comprimento, produto.largura, produto.altura],
        [produto.comprimento, produto.altura, produto.largura],
        [produto.largura, produto.comprimento, produto.altura],
        [produto.largura, produto.altura, produto.comprimento],
        [produto.altura, produto.comprimento, produto.largura],
        [produto.altura, produto.largura, produto.comprimento],
    ];

    return rotacoes.some(r =>
        r[0] <= caixa.comprimento &&
        r[1] <= caixa.largura &&
        r[2] <= caixa.altura
    );
}

// 🔹 ENCAIXE POR VOLUME CONTROLADO
function tentarEncaixar(produto, caixa) {

    const volumeProduto =
        produto.comprimento *
        produto.largura *
        produto.altura;

    if (caixa.volumeUsado + volumeProduto <= caixa.volumeTotal) {
        caixa.volumeUsado += volumeProduto;
        return true;
    }

    return false;
}

function calcular() {

    const linhas = document.querySelectorAll(".produto-linha");

    if (linhas.length === 0) {
        alert("Adicione pelo menos um produto.");
        return;
    }

    let listaUnidades = [];

    linhas.forEach(linha => {
        const nome = linha.children[0].value;
        const quantidade = parseInt(linha.children[1].value);
        const produto = produtos[nome];

        for (let i = 0; i < quantidade; i++) {
            listaUnidades.push({
                nome,
                comprimento: produto.comprimento,
                largura: produto.largura,
                altura: produto.altura
            });
        }
    });

    listaUnidades.sort((a, b) => {
        const volA = a.comprimento * a.largura * a.altura;
        const volB = b.comprimento * b.largura * b.altura;
        return volB - volA;
    });

    let caixasAbertas = [];

    listaUnidades.forEach(produto => {

        let encaixado = false;

        for (let caixa of caixasAbertas) {
            if (tentarEncaixar(produto, caixa)) {
                encaixado = true;
                break;
            }
        }

        if (!encaixado) {
      let melhorModelo = null;
let melhorAproveitamento = 0;

for (let modelo of caixas) {

    if (produtoCabe(produto, modelo)) {

        let volumeProduto =
            produto.comprimento *
            produto.largura *
            produto.altura;

        let volumeCaixa =
            modelo.comprimento *
            modelo.largura *
            modelo.altura;

        let aproveitamento =
            volumeProduto / volumeCaixa;

        if (aproveitamento > melhorAproveitamento) {
            melhorAproveitamento = aproveitamento;
            melhorModelo = modelo;
        }
    }
}

if (melhorModelo) {

    let novaCaixa = {
        nome: melhorModelo.nome,
        comprimento: melhorModelo.comprimento,
        largura: melhorModelo.largura,
        altura: melhorModelo.altura,
        volumeTotal:
            melhorModelo.comprimento *
            melhorModelo.largura *
            melhorModelo.altura,
        volumeUsado: 0
    };

    tentarEncaixar(produto, novaCaixa);
    caixasAbertas.push(novaCaixa);
}
        }
    });

    // 🔹 DASHBOARD
    let resumoTipos = {};
    let volumeMercadorias = 0;
    let volumeTotalCaixas = 0;

    caixasAbertas.forEach(c => {

        if (!resumoTipos[c.nome]) {
            resumoTipos[c.nome] = 0;
        }
        resumoTipos[c.nome]++;

        volumeMercadorias += c.volumeUsado;
        volumeTotalCaixas += c.volumeTotal;
    });

    const totalCaixas = caixasAbertas.length;
    const aproveitamentoFinal =
        ((volumeMercadorias / volumeTotalCaixas) * 100).toFixed(2);

    let html = `
    <div style="background:#111;color:white;padding:15px;border-radius:10px;margin-bottom:20px;">
        <h3 style="margin-top:0;">📊 Resumo da Simulação</h3>
        <strong>Total de caixas:</strong> ${totalCaixas}<br>
    `;

    for (let tipo in resumoTipos) {
        html += `<strong>${tipo}:</strong> ${resumoTipos[tipo]}<br>`;
    }

    html += `
        <br>
        <strong>Volume mercadorias:</strong> ${(volumeMercadorias/1000000).toFixed(6)} m³<br>
        <strong>Volume caixas:</strong> ${(volumeTotalCaixas/1000000).toFixed(6)} m³<br>
        <strong>Aproveitamento geral:</strong> ${aproveitamentoFinal}%
    </div>
    `;

    caixasAbertas.forEach((c, index) => {

        const percentual =
            ((c.volumeUsado / c.volumeTotal) * 100).toFixed(2);

        html += `
        <div style="margin-bottom:15px;">
            <strong>📦 Caixa ${c.nome} #${index + 1}</strong><br>

            <div style="background:#ddd;height:20px;border-radius:5px;">
                <div style="
                    width:${percentual}%;
                    background:#28a745;
                    height:20px;
                    border-radius:5px;">
                </div>
            </div>

            Ocupação: ${percentual}%<br>
            Volume usado: ${(c.volumeUsado / 1000000).toFixed(6)} m³<br>
            Volume total: ${(c.volumeTotal / 1000000).toFixed(6)} m³<br>
        </div>
        `;
    });

    document.getElementById("resultado").innerHTML = html;
}

adicionarProduto();

</script>

</body>
</html>
