<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Cubagem</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 30px;
    }

    .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
    }

    select, input, button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        font-size: 16px;
    }

    button {
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #0056b3;
    }

    .resultado {
        margin-top: 20px;
        background: #e9f5ff;
        padding: 15px;
        border-radius: 8px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Sistema de Cubagem</h2>

    <label>Produto:</label>
    <select id="produtoSelect"></select>

    <label>Quantidade:</label>
    <input type="number" id="quantidade" min="1" value="1">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>

// 🔹 PRODUTOS PRÉ-DEFINIDOS (cm)
const produtos = {
    "Painel 100x2x2": { comprimento: 100, largura: 2, altura: 2 },
    "Barra 80x5x5": { comprimento: 80, largura: 5, altura: 5 },
    "Placa 60x40x3": { comprimento: 60, largura: 40, altura: 3 }
};

// 🔹 CAIXAS (cm)
const caixas = [
    { nome: "Pequena", comprimento: 60, largura: 30, altura: 30 },
    { nome: "Média", comprimento: 110, largura: 30, altura: 30 },
    { nome: "Grande", comprimento: 110, largura: 60, altura: 60 }
];

// 🔹 POPULAR SELECT
const select = document.getElementById("produtoSelect");
for (let nome in produtos) {
    let option = document.createElement("option");
    option.value = nome;
    option.textContent = nome;
    select.appendChild(option);
}

// 🔹 FUNÇÃO DE ENCAIXE COM ROTAÇÕES
function calcularMelhorEncaixe(produto, caixa) {
    const rotacoes = [
        [produto.comprimento, produto.largura, produto.altura],
        [produto.comprimento, produto.altura, produto.largura],
        [produto.largura, produto.comprimento, produto.altura],
        [produto.largura, produto.altura, produto.comprimento],
        [produto.altura, produto.comprimento, produto.largura],
        [produto.altura, produto.largura, produto.comprimento],
    ];

    let maxUnidades = 0;

    for (let rot of rotacoes) {
        const qtdComprimento = Math.floor(caixa.comprimento / rot[0]);
        const qtdLargura = Math.floor(caixa.largura / rot[1]);
        const qtdAltura = Math.floor(caixa.altura / rot[2]);

        const total = qtdComprimento * qtdLargura * qtdAltura;

        if (total > maxUnidades) {
            maxUnidades = total;
        }
    }

    return maxUnidades;
}

// 🔹 FUNÇÃO PRINCIPAL
function calcular() {
    const nomeProduto = select.value;
    const quantidade = parseInt(document.getElementById("quantidade").value);

    if (quantidade <= 0) {
        alert("Quantidade inválida.");
        return;
    }

    const produto = produtos[nomeProduto];

    // 🔹 Volume mercadoria
    const volumeUnitarioCm3 =
        produto.comprimento *
        produto.largura *
        produto.altura;

    const volumeUnitarioM3 = volumeUnitarioCm3 / 1000000;
    const volumeTotalMercadoriasM3 =
        volumeUnitarioM3 * quantidade;

    let melhorOpcao = null;

    for (let caixa of caixas) {
        const capacidade = calcularMelhorEncaixe(produto, caixa);

        if (capacidade > 0) {
            const caixasNecessarias =
                Math.ceil(quantidade / capacidade);

            if (!melhorOpcao ||
                caixasNecessarias < melhorOpcao.caixasNecessarias) {
                melhorOpcao = {
                    caixa,
                    capacidade,
                    caixasNecessarias
                };
            }
        }
    }

    if (!melhorOpcao) {
        document.getElementById("resultado").innerHTML =
            "<strong>Produto não cabe em nenhuma caixa.</strong>";
        return;
    }

    // 🔹 Volume caixas
    const volumeCaixaCm3 =
        melhorOpcao.caixa.comprimento *
        melhorOpcao.caixa.largura *
        melhorOpcao.caixa.altura;

    const volumeCaixaM3 = volumeCaixaCm3 / 1000000;
    const volumeTotalCaixasM3 =
        volumeCaixaM3 * melhorOpcao.caixasNecessarias;

    document.getElementById("resultado").innerHTML = `
        <strong>Caixa escolhida:</strong> ${melhorOpcao.caixa.nome}<br>
        <strong>Caixas necessárias:</strong> ${melhorOpcao.caixasNecessarias}<br><br>
        <strong>Volume total mercadorias:</strong> ${volumeTotalMercadoriasM3.toFixed(6)} m³<br>
        <strong>Volume total caixas:</strong> ${volumeTotalCaixasM3.toFixed(6)} m³
    `;
}

</script>

</body>
</html>
