// Adicionar linha de produto
function adicionarProduto() {
    const div = document.createElement("div");
    div.className = "produto-linha";

    const select = document.createElement("select");
    for (let nome in produtos) {
        let option = document.createElement("option");
        option.value = nome;
        option.textContent = nome;
        select.appendChild(option);
    }

    const input = document.createElement("input");
    input.type="number"; input.min="1"; input.value="1"; input.style.width="80px";

    div.appendChild(select);
    div.appendChild(input);
    document.getElementById("listaProdutos").appendChild(div);
}

// Gerar rotações 3D
function gerarRotacoes(produto) {
    const { comprimento:L, largura:W, altura:H } = produto;
    return [
        [L,W,H],[L,H,W],
        [W,L,H],[W,H,L],
        [H,L,W],[H,W,L]
    ];
}

// Checar se produto cabe na caixa (qualquer rotação)
function produtoCabe(produto, caixa) {
    return gerarRotacoes(produto).some(([l,w,h]) => l<=caixa.comprimento && w<=caixa.largura && h<=caixa.altura);
}

// Função de cópia profunda de objetos
function deepCopy(obj){ return JSON.parse(JSON.stringify(obj)); }

// Função de backtracking para achar melhor solução
function backtrack(produtosLista, caixasDisponiveis, index=0, caixasAbertas=[], melhorSol=null){
    if(index>=produtosLista.length){
        // Solução completa
        let volumeUsadoTotal = caixasAbertas.reduce((acc,c)=>acc+(c.volumeUsado||0),0);
        let volumeTotal = caixasAbertas.reduce((acc,c)=>acc+c.volumeTotal,0);
        let aproveitamento = volumeUsadoTotal/volumeTotal;
        if(!melhorSol || aproveitamento>melhorSol.aproveitamento){
            melhorSol = { caixas: deepCopy(caixasAbertas), aproveitamento };
        }
        return melhorSol;
    }

    let produto = produtosLista[index];
    let volumeProduto = produto.comprimento*produto.largura*produto.altura;

    // Tenta encaixar em cada caixa aberta
    for(let i=0;i<caixasAbertas.length;i++){
        let caixa = caixasAbertas[i];
        if(produtoCabe(produto, caixa) && (caixa.volumeUsado+volumeProduto)<=caixa.volumeTotal){
            caixa.volumeUsado += volumeProduto;
            caixa.produtos.push(produto.nome);
            melhorSol = backtrack(produtosLista, caixasDisponiveis, index+1, caixasAbertas, melhorSol);
            // backtrack
            caixa.volumeUsado -= volumeProduto;
            caixa.produtos.pop();
        }
    }

    // Tenta abrir nova caixa
    for(let modelo of caixasDisponiveis){
        if(produtoCabe(produto, modelo)){
            let novaCaixa = { ...modelo, volumeTotal:modelo.comprimento*modelo.largura*modelo.altura, volumeUsado:volumeProduto, produtos:[produto.nome] };
            caixasAbertas.push(novaCaixa);
            melhorSol = backtrack(produtosLista, caixasDisponiveis, index+1, caixasAbertas, melhorSol);
            caixasAbertas.pop();
        }
    }

    return melhorSol;
}

// Função principal
function calcular(){
    const linhas = document.querySelectorAll(".produto-linha");
    if(linhas.length===0){ alert("Adicione pelo menos um produto."); return; }

    let listaUnidades=[];
    linhas.forEach(linha=>{
        const nome = linha.children[0].value;
        const quantidade = parseInt(linha.children[1].value);
        for(let i=0;i<quantidade;i++){
            listaUnidades.push({ nome, ...produtos[nome] });
        }
    });

    // Ordenar por volume decrescente
    listaUnidades.sort((a,b)=>(b.comprimento*b.largura*b.altura)-(a.comprimento*a.largura*a.altura));

    document.getElementById("resultado").innerHTML = "<p>Calculando, aguarde...</p>";

    // Executar backtracking pesado
    setTimeout(()=>{
        let melhor = backtrack(listaUnidades, caixas);
        if(!melhor){ document.getElementById("resultado").innerHTML="Nenhuma solução encontrada"; return; }

        let html = `<h3>📊 Melhor Solução Encontrada</h3>
        <strong>Total de caixas:</strong> ${melhor.caixas.length}<br>`;
        melhor.caixas.forEach((c,i)=>{
            const perc = ((c.volumeUsado/c.volumeTotal)*100).toFixed(2);
            html+=`<div style="margin-bottom:10px;">
            <strong>📦 ${c.nome} #${i+1}</strong><br>
            Ocupação: ${perc}%<br>
            Volume usado: ${(c.volumeUsado/1000000).toFixed(6)} m³<br>
            Volume total: ${(c.volumeTotal/1000000).toFixed(6)} m³<br>
            Produtos: ${c.produtos.join(", ")}
            </div>`;
        });

        html+=`<strong>Aproveitamento geral:</strong> ${(melhor.aproveitamento*100).toFixed(2)}%`;
        document.getElementById("resultado").innerHTML = html;
    },100);
}
